{% extends 'base.html' %}

{% block title %}Add Skill - Task Allocation System{% endblock %}

{% block content %}
<div class="row">
    <div class="col-12 mb-4">
        <h3><i class="fas fa-plus"></i> Add New Skill</h3>
        <hr>
    </div>
</div>

<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card shadow">
            <div class="card-header bg-dark text-white">
                <h5><i class="fas fa-cogs"></i> Skill Details</h5>
            </div>
            <div class="card-body p-4">
                <form method="POST" action="/skill/add">
                    <div class="mb-3">
                        <label class="form-label">Skill Name</label>
                        <input type="text" name="skill_name" class="form-control" 
                        placeholder="Enter skill name" required>
                    </div>
                    <div class="d-grid gap-2">
                        <button type="submit" class="btn btn-dark">
                            <i class="fas fa-save"></i> Save Skill
                        </button>
                        <a href="/skill/list" class="btn btn-secondary">
                            <i class="fas fa-arrow-left"></i> Back
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
